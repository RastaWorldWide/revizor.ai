services:
  postgres:
    image: postgres:16
    container_name: revizor_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: review_sites
    ports:
      - "5432:5432"
    volumes:
      - revizor_postgres_data:/var/lib/postgresql/data

volumes:
  revizor_postgres_data:
